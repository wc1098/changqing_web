services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: changqing-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: changqing
      POSTGRES_USER: changqing
      POSTGRES_PASSWORD: changqing
    ports:
      - "5432:5432"
    volumes:
      - ./data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U changqing -d changqing"]
      interval: 5s
      timeout: 3s
      retries: 10
